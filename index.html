<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Survival Simulator</title>

<style>
body{
  margin:0;
  background:#04070d;
  color:#e8f4ff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.screen{display:none;padding:20px;}
.screen.active{display:block;}

#nav-overlay{
  position:fixed;top:12px;right:14px;z-index:200;
  display:none;gap:6px;
}

#nav-overlay.visible{display:flex;}

.nav-pill{
  background:rgba(10,15,25,0.85);
  border:1px solid rgba(0,229,255,0.25);
  color:#8fb3d9;
  padding:6px 12px;
  cursor:pointer;
}

.nav-pill:hover{
  color:#00e5ff;
  background:rgba(10,15,25,0.95);
}

.btn{
  padding:14px 24px;
  background:#00e5ff;
  border:none;
  color:#001018;
  cursor:pointer;
  margin-top:20px;
}

.btn-ghost{
  background:rgba(10,15,25,0.9);
  color:#8fb3d9;
  border:1px solid rgba(0,229,255,0.25);
}
</style>
</head>

<body>

<div id="nav-overlay">
  <div class="nav-pill" onclick="goHome()">HOME</div>
  <div class="nav-pill" onclick="goBack()">BACK</div>
</div>

<div id="screen-intro" class="screen active">
  <h1>AI Survival Simulator</h1>
  <p>Can you survive?</p>
  <button class="btn" onclick="startMiniGameFlow()">LAUNCH SIMULATION →</button>
</div>

<div id="screen-minigame" class="screen">
  <h2>Game Running...</h2>
  <button class="btn-ghost" onclick="endGame()">End Game</button>
</div>

<div id="screen-gameover" class="screen">
  <h2>💀 You got replaced</h2>
  <p>You moved too slow</p>
  <button class="btn" onclick="goUnlock()">⚡ See How to Survive</button>
</div>

<script>
let screenHistory = [];

function showScreen(id){
  const current = document.querySelector('.screen.active');
  if(current){
    screenHistory.push(current.id);
    current.classList.remove('active');
  }
  document.getElementById(id).classList.add('active');
  updateNav();
}

function startMiniGameFlow(){
  showScreen('screen-minigame');
}

function endGame(){
  showScreen('screen-gameover');
}

function goUnlock(){
  window.location.href="unlock.html";
}

function goBack(){
  if(screenHistory.length > 0){
    const prev = screenHistory.pop();
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    updateNav();
  }
}

function goHome(){
  screenHistory = [];
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-intro').classList.add('active');
  updateNav();
}

function updateNav(){
  const nav = document.getElementById("nav-overlay");
  const current = document.querySelector(".screen.active");

  if(current && current.id === "screen-intro"){
    nav.classList.remove("visible");
  } else {
    nav.classList.add("visible");
  }
}

updateNav();
</script>

</body>
</html>
